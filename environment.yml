name: stac-catalog
channels:
  - conda-forge
  - defaults
dependencies:
  - python>=3.9
  - pip
  - pip:
      # Core STAC packages
      - pystac[validation]>=1.12.0  # validation extra = jsonschema, required by item_validate.py
      - pystac-client>=0.8.0
      - rio-stac>=0.11.0
      # Geospatial packages
      - rasterio>=1.4.0
      - rio-cogeo
      - shapely
      # Data processing
      - pandas
      # Utilities
      - requests  # HTTP checks (stac_utils, urls_check_access.py)
      - tqdm
      - deepdiff  # JSON/dict comparison for QA and debugging
